<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Kiosk UI</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background-color: #121212;\n            color: #ffffff;\n            margin: 0;\n            padding: 20px;\n        }\n        .container {\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n        }\n        h1 {\n            margin: 20px 0;\n        }\n        .schedule {\n            background-color: #1e1e1e;\n            padding: 15px;\n            border-radius: 8px;\n            width: 300px;\n            text-align: center;\n        }\n        .error {\n            color: red;\n            display: none;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <h1>Kiosk Standby Screen</h1>\n        <div class=\"schedule\">\n            <div id=\"scheduleDisplay\">Schedule will be displayed here.</div>\n            <div id=\"errorDisplay\" class=\"error\">Error loading schedule. Please try again.</div>\n        </div>\n    </div>\n    <script>\n        const scheduleDisplay = document.getElementById('scheduleDisplay');\n        const errorDisplay = document.getElementById('errorDisplay');\n        const timeoutDuration = 30000; // 30 seconds\n        let timeoutId;\n        \n        function displaySchedule() {\n            // Simulate scheduling data retrieval\n            setTimeout(() => {\n                const scheduleData = 'Next Event: Meeting at 10:00 AM';  // Replace with actual data retrieval logic\n                scheduleDisplay.textContent = scheduleData;\n                resetTimeout();\n            }, 1000); // Simulate network delay\n        }\n        \n        function handleError() {\n            errorDisplay.style.display = 'block';\n            scheduleDisplay.style.display = 'none';\n        }\n        \n        function resetTimeout() {\n            clearTimeout(timeoutId);\n            timeoutId = setTimeout(handleError, timeoutDuration);\n        }\n        \n        // Start the schedule display process\n        displaySchedule();\n        resetTimeout();\n    </script>\n</body>\n</html>\n
