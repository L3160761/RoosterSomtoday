<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoosterSomtoday</title>
  <style>
    :root {
      --page: #0c0d15;
      --left-panel: #141522;
      --right-panel: #0f1019;
      --frame: #202235;
      --divider: #0e0f17;
      --card: #192f45;
      --accent: #6ba1d7;
      --accent-dark: #6ba1d7;
      --text: #f5f6f4;
      --muted: #b7b7b7;
      --track: #232838;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body { padding: clamp(8px, 0.75vw, 14px); }

    .screen-frame {
      width: 100%;
      height: 100%;
      border: 3px solid var(--frame);
      border-radius: clamp(22px, 1.75vw, 34px);
      overflow: hidden;
      background: var(--right-panel);
      box-shadow: 0 0 0 2px #080a11;
    }

    .standby-screen {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      text-align: center;
      background: #10111a;
    }

    .standby-content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(44px, 4.4vh, 64px) 24px clamp(42px, 4vh, 58px);
    }

    .standby-clock {
      margin: 0;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-size: clamp(96px, 9.2vw, 170px);
      line-height: 0.9;
      font-weight: 850;
      letter-spacing: -0.055em;
    }

    .standby-date {
      margin-top: clamp(22px, 2.5vh, 34px);
      color: var(--text);
      font-size: clamp(28px, 2.25vw, 42px);
      line-height: 1;
      font-weight: 800;
      text-transform: capitalize;
    }

    .nfc-symbol-wrap {
      display: grid;
      place-items: center;
      width: clamp(150px, 12vw, 225px);
      height: clamp(100px, 10vh, 145px);
      margin-top: clamp(24px, 3vh, 40px);
    }

    .nfc-symbol {
      display: block;
      width: 100%;
      max-height: 100%;
      object-fit: contain;
      filter: invert(1) drop-shadow(0 0 16px rgba(245, 246, 244, 0.13));
      opacity: 0.96;
      animation: nfcFloat 2.4s ease-in-out infinite;
    }

    .scan-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: auto;
    }

    .scan-prompt {
      margin: 0;
      color: var(--text);
      font-size: clamp(40px, 3.15vw, 60px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: -0.025em;
    }

    .scan-arrow {
      width: clamp(38px, 3vw, 56px);
      height: clamp(38px, 3vw, 56px);
      margin-top: clamp(28px, 3.2vh, 44px);
      border-right: clamp(6px, 0.42vw, 8px) solid var(--text);
      border-bottom: clamp(6px, 0.42vw, 8px) solid var(--text);
      border-radius: 0 0 6px 0;
      filter: drop-shadow(0 0 8px rgba(107, 161, 215, 0.28));
      animation: arrowFloat 1.35s ease-in-out infinite;
    }

    @keyframes nfcFloat {
      0%, 100% {
        transform: translateY(-4px) scale(0.99);
      }
      50% {
        transform: translateY(7px) scale(1.01);
      }
    }

    @keyframes arrowFloat {
      0%, 100% {
        opacity: 0.7;
        transform: translateY(-6px) rotate(45deg);
      }
      50% {
        opacity: 1;
        transform: translateY(10px) rotate(45deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .scan-arrow,
      .nfc-symbol { animation: none; }
    }

    .schedule-screen {
      display: none;
      width: 100%;
      height: 100%;
      grid-template-columns: 50.5% 49.5%;
    }

    .schedule-screen.active { display: grid; }

    .left-panel,
    .right-panel {
      position: relative;
      min-width: 0;
      height: 100%;
    }

    .left-panel {
      padding: clamp(28px, 2.25vw, 54px) clamp(34px, 3vw, 64px);
      background: var(--left-panel);
      border-right: 2px solid var(--divider);
    }

    .right-panel {
      padding: clamp(28px, 2.2vw, 50px) clamp(36px, 4.75vw, 90px) clamp(24px, 2vw, 44px) clamp(48px, 5.2vw, 100px);
      background: var(--right-panel);
    }

    h1,
    h2 { margin: 0; }

    .welcome {
      font-size: clamp(44px, 3.55vw, 68px);
      line-height: 1.05;
      font-weight: 850;
      letter-spacing: -0.035em;
    }

    .student-name { color: var(--accent); }

    .section-heading {
      margin-top: clamp(32px, 4.25vh, 54px);
      font-size: clamp(28px, 2.45vw, 46px);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.025em;
    }

    .next-row {
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 16px;
      margin-top: clamp(14px, 1.8vh, 24px);
      margin-left: 14px;
      max-width: 680px;
    }

    .next-lesson-host { display: contents; }

    .period-number {
      color: var(--text);
      font-size: clamp(20px, 1.6vw, 30px);
      font-weight: 450;
      text-align: center;
    }

    .lesson-card {
      position: relative;
      min-height: clamp(82px, 9.3vh, 108px);
      padding: clamp(12px, 1.15vh, 18px) clamp(18px, 1.35vw, 26px);
      border-left: 6px solid var(--accent);
      border-radius: 14px;
      background: var(--card);
      overflow: hidden;
    }

    .lesson-subject {
      max-width: calc(100% - 128px);
      overflow: hidden;
      color: var(--text);
      font-size: clamp(20px, 1.63vw, 31px);
      line-height: 1.18;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lesson-details {
      margin-top: 8px;
      overflow: hidden;
      color: var(--muted);
      font-size: clamp(17px, 1.35vw, 26px);
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .time-pill {
      position: absolute;
      top: 11px;
      right: 13px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 96px;
      padding: 3px 13px 4px;
      border-radius: 999px;
      background: var(--accent);
      color: #07101a;
      font-size: clamp(15px, 1.1vw, 21px);
      line-height: 1;
      white-space: nowrap;
    }

    .clock-icon {
      position: relative;
      display: inline-block;
      width: 19px;
      height: 19px;
      flex: 0 0 19px;
      border-radius: 50%;
      background: currentColor;
    }

    .clock-icon::before,
    .clock-icon::after {
      position: absolute;
      left: 9px;
      top: 4px;
      width: 2px;
      height: 6px;
      border-radius: 2px;
      background: var(--accent);
      content: "";
      transform-origin: bottom center;
    }

    .clock-icon::after {
      top: 8px;
      height: 5px;
      transform: rotate(125deg);
    }

    .day-info-heading { margin-top: clamp(38px, 4.2vh, 56px); }

    .day-time {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 20px 0 0 25px;
      font-size: clamp(21px, 1.6vw, 30px);
      font-weight: 450;
    }

    .day-time .clock-icon {
      width: 27px;
      height: 27px;
      flex-basis: 27px;
      color: var(--text);
    }

    .day-time .clock-icon::before {
      left: 13px;
      top: 6px;
      height: 8px;
      background: var(--left-panel);
    }

    .day-time .clock-icon::after {
      left: 13px;
      top: 12px;
      height: 7px;
      background: var(--left-panel);
    }

    .timer-ring {
      --progress: 75%;
      position: absolute;
      left: clamp(36px, 2.7vw, 54px);
      bottom: clamp(28px, 2.6vh, 42px);
      width: clamp(104px, 7.2vw, 136px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--accent) var(--progress), var(--track) 0);
      transform: rotate(-68deg);
    }

    .timer-ring::after {
      position: absolute;
      inset: 11px;
      border-radius: 50%;
      background: var(--left-panel);
      content: "";
    }

    .right-title {
      font-size: clamp(28px, 2.15vw, 42px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    .schedule-grid {
      position: relative;
      height: calc(100% - clamp(54px, 6.6vh, 78px));
      margin-top: clamp(24px, 3vh, 34px);
      margin-right: clamp(58px, 4.2vw, 76px);
    }

    .schedule-grid::before,
    .schedule-grid::after {
      position: absolute;
      top: 0;
      bottom: 0;
      z-index: 0;
      width: 1px;
      background: rgba(183, 183, 183, 0.3);
      content: "";
      pointer-events: none;
    }

    .schedule-grid::before {
      left: 44px;
    }

    .schedule-grid::after {
      right: 0;
    }

    .timeline-marker {
      position: absolute;
      left: 0;
      right: calc(-1 * clamp(58px, 4.2vw, 76px));
      z-index: 0;
      border-top: 1px solid rgba(183, 183, 183, 0.24);
      pointer-events: none;
    }

    .timeline-time {
      position: absolute;
      top: 0;
      right: 0;
      width: clamp(52px, 3.8vw, 68px);
      padding-right: 2px;
      color: var(--muted);
      font-size: clamp(12px, 0.92vw, 17px);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      text-align: right;
      transform: translateY(-50%);
    }

    .timeline-marker:first-child .timeline-time {
      transform: translateY(2px);
    }

    .timeline-marker.timeline-end .timeline-time {
      transform: translateY(calc(-100% - 2px));
    }

    .schedule-slot {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 1;
      display: grid;
      grid-template-columns: 30px 1fr;
      align-items: stretch;
      gap: 14px;
      min-height: 0;
    }

    .schedule-slot .period-number {
      padding-top: 14px;
      text-shadow: 0 1px 3px var(--right-panel);
    }

    .schedule-slot .lesson-card {
      min-height: 0;
      height: 100%;
      padding-top: 10px;
      padding-bottom: 9px;
      box-shadow: 0 0 0 1px rgba(107, 161, 215, 0.08);
    }

    .schedule-slot .lesson-subject { font-size: clamp(18px, 1.42vw, 27px); }
    .schedule-slot .lesson-details { margin-top: 6px; font-size: clamp(16px, 1.25vw, 23px); }

    .error-toast {
      position: fixed;
      left: 50%;
      bottom: 30px;
      z-index: 10;
      display: none;
      padding: 14px 22px;
      border: 1px solid #a94752;
      border-radius: 12px;
      background: #351b25;
      color: #ffcad0;
      transform: translateX(-50%);
    }

    .error-toast.show { display: block; }

    @media (max-width: 900px), (max-aspect-ratio: 1.25/1) {
      body { overflow: auto; padding: 0; }
      .screen-frame { min-height: 100%; border-radius: 0; }
      .schedule-screen { grid-template-columns: 1fr; height: auto; min-height: 100%; }
      .left-panel, .right-panel { min-height: 100vh; }
      .right-panel { padding-left: 36px; }
      .timer-ring { position: relative; left: auto; bottom: auto; margin-top: 60px; }
    }
  </style>
</head>

    <section class="schedule-screen" id="scheduleScreen">
      <div class="left-panel">

        <h2 class="section-heading">Volgende les</h2>

          <div class="period-number" id="nextPeriod">1</div>
          <div class="next-lesson-host" id="nextLessonHost"></div>
        </div>

        <h2 class="section-heading day-info-heading">Daginfo</h2>
        <div class="day-time">
          <span class="clock-icon" aria-hidden="true"></span>
          <span id="dayTime">8:30 - 12:45</span>
        </div>

        <div class="timer-ring" id="timerRing" aria-label="Tijd tot terugkeer naar het scanscherm"></div>
      </div>

        <div class="schedule-grid" id="scheduleGrid"></div>

  <div class="error-toast" id="errorToast"></div>

  <script>
    const API_ORIGIN = 'http://localhost:8000';
    const HARDWARE_SCAN_API_URL = `${API_ORIGIN}/api/scan-hardware`;
    const DEFAULT_TIMEOUT_SECONDS = 15;
    const TIMELINE_START_MINUTES = 8 * 60 + 30;
    const TIMELINE_END_MINUTES = 16 * 60;
    const PERIODS = [
      { number: 1, start: '08:30', end: '09:45' },
      { number: 2, start: '10:00', end: '11:15' },
      { number: 3, start: '11:30', end: '12:45' },
      { number: 4, start: '13:15', end: '14:30' },
      { number: 5, start: '14:45', end: '16:00' },
    ];
    const TIMELINE_MARKS = [
      '08:30',
      '09:45',
      '10:00',
      '11:15',
      '11:30',
      '12:45',
      '13:15',
      '14:30',
      '14:45',
      '16:00',
    ];

    const standbyScreen = document.getElementById('standbyScreen');
    const scheduleScreen = document.getElementById('scheduleScreen');
    const studentName = document.getElementById('studentName');
    const nextPeriod = document.getElementById('nextPeriod');
    const nextLessonHost = document.getElementById('nextLessonHost');
    const dayTime = document.getElementById('dayTime');
    const scheduleGrid = document.getElementById('scheduleGrid');
    const timerRing = document.getElementById('timerRing');
    const errorToast = document.getElementById('errorToast');
    const clock = document.getElementById('clock');
    const date = document.getElementById('date');

    let isScanning = false;
    let scanRetryTimeoutId;
    let screenTimerId;

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString('nl-NL', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
      });
      date.textContent = now.toLocaleDateString('nl-NL', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
      });
    }

    function createClockIcon() {
      const icon = document.createElement('span');
      icon.className = 'clock-icon';
      icon.setAttribute('aria-hidden', 'true');
      return icon;
    }

    function createLessonCard(lesson) {
      const card = document.createElement('article');
      card.className = 'lesson-card';

      const subject = document.createElement('div');
      subject.className = 'lesson-subject';
      subject.textContent = lesson.subject || 'Onbekende les';

      const details = document.createElement('div');
      details.className = 'lesson-details';
      details.textContent = [lesson.room, lesson.teacher].filter(Boolean).join(' • ');

      const pill = document.createElement('div');
      pill.className = 'time-pill';
      pill.append(createClockIcon(), document.createTextNode(lesson.start || '--:--'));

      card.append(subject, details, pill);
      return card;
    }

    function timeToMinutes(value) {
      const [hours, minutes] = String(value || '').split(':').map(Number);
      return Number.isFinite(hours) && Number.isFinite(minutes)
        ? hours * 60 + minutes
        : TIMELINE_START_MINUTES;
    }

    function timelinePercent(value) {
      const minutes = timeToMinutes(value);
      const duration = TIMELINE_END_MINUTES - TIMELINE_START_MINUTES;
      return Math.max(0, Math.min(100, (
        (minutes - TIMELINE_START_MINUTES) / duration
      ) * 100));
    }

    function periodForLesson(lesson, lessons) {
      const explicitPeriod = Number(lesson?.period);
      if (Number.isInteger(explicitPeriod) && explicitPeriod > 0) {
        return explicitPeriod;
      }

      const matchedPeriod = PERIODS.find((period) => period.start === lesson?.start);
      if (matchedPeriod) return matchedPeriod.number;

      const index = lessons.findIndex((candidate) =>
        candidate.start === lesson?.start &&
        candidate.end === lesson?.end &&
        candidate.subject === lesson?.subject
      );
      return index >= 0 ? index + 1 : 1;
    }

    function renderSchedule(lessons) {
      scheduleGrid.replaceChildren();
      TIMELINE_MARKS.forEach((time, index) => {
        const marker = document.createElement('div');
        marker.className = 'timeline-marker';
        if (index === TIMELINE_MARKS.length - 1) {
          marker.classList.add('timeline-end');
        }
        marker.style.top = `${timelinePercent(time)}%`;

        const label = document.createElement('span');
        label.className = 'timeline-time';
        label.textContent = time;
        marker.append(label);
        scheduleGrid.append(marker);
      });

      const lessonsByPeriod = new Map(
        lessons.map((lesson, index) => [
          periodForLesson(lesson, lessons) || index + 1,
          lesson,
        ])
      );

      PERIODS.forEach((period) => {
        const lesson = lessonsByPeriod.get(period.number);
        const start = lesson?.start || period.start;
        const end = lesson?.end || period.end;

        const row = document.createElement('div');
        row.className = 'schedule-slot';
        row.style.top = `${timelinePercent(start)}%`;
        row.style.height = `${timelinePercent(end) - timelinePercent(start)}%`;

        const number = document.createElement('div');
        number.className = 'period-number';
        number.textContent = period.number;
        row.append(number);

        if (lesson) row.append(createLessonCard(lesson));
        scheduleGrid.append(row);
      });
    }

    function formatScheduleDate(value) {
      if (!value) return '';
      const scheduleDate = new Date(`${value}T12:00:00`);
      const label = scheduleDate.toLocaleDateString('nl-NL', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
      });
      return label.charAt(0).toUpperCase() + label.slice(1);
    }

    function showSchedule(data) {
      clearTimeout(scanRetryTimeoutId);
      standbyScreen.style.display = 'none';
      scheduleScreen.classList.add('active');

      const lessons = Array.isArray(data.today) ? data.today : [];
      const featuredLesson = data.next || data.now || lessons[0] || {};
      studentName.textContent = data.student_display || 'Gebruiker';
      nextPeriod.textContent = periodForLesson(featuredLesson, lessons);
      nextLessonHost.replaceChildren(createLessonCard(featuredLesson));

      const scheduleDateLabel = formatScheduleDate(data.date);
      dayTime.textContent = lessons.length
        ? `${scheduleDateLabel} • ${lessons[0].start} - ${lessons[lessons.length - 1].end}`
        : '-';
      renderSchedule(lessons);
      startScreenTimer(Number(data.ui?.timeout_seconds) || DEFAULT_TIMEOUT_SECONDS);
    }

    function startScreenTimer(totalSeconds) {
      clearInterval(screenTimerId);
      const startedAt = Date.now();
      timerRing.style.setProperty('--progress', '100%');

      screenTimerId = setInterval(() => {
        const elapsed = (Date.now() - startedAt) / 1000;
        const progress = Math.max(0, 1 - elapsed / totalSeconds);
        timerRing.style.setProperty('--progress', `${progress * 100}%`);
        if (progress <= 0) showStandby();
      }, 100);
    }

    function queueHardwareScan(delay = 250) {
      clearTimeout(scanRetryTimeoutId);
      scanRetryTimeoutId = setTimeout(scanHardware, delay);
    }

    function showStandby() {
      clearInterval(screenTimerId);
      scheduleScreen.classList.remove('active');
      standbyScreen.style.display = 'grid';
      errorToast.classList.remove('show');
      isScanning = false;
      queueHardwareScan();
    }

    async function scanHardware() {
      if (isScanning) return;
      isScanning = true;

      try {
        const response = await fetch(HARDWARE_SCAN_API_URL);
        if (!response.ok) {
          isScanning = false;
          queueHardwareScan(750);
          return;
        }
        showSchedule(await response.json());
      } catch (error) {
        isScanning = false;
        queueHardwareScan(1000);
      }
    }

    const demoData = {
      student_display: 'Gebruiker',
      next: { start: '10:00', end: '10:45', subject: 'Nederlandse taal en Literatuur', room: 'abc003', teacher: 'jdk' },
      today: [
        { start: '8:30', end: '9:15', subject: 'Wiskunde B', room: 'abc202', teacher: 'wde' },
        { start: '9:15', end: '10:00', subject: 'Wiskunde B', room: 'abc202', teacher: 'wde' },
        { start: '10:00', end: '10:45', subject: 'Nederlandse taal en Literatuur', room: 'abc003', teacher: 'jdk' },
        { start: '11:15', end: '12:00', subject: 'Scheikunde', room: 'a115', teacher: 'bkm' },
        { start: '12:00', end: '12:45', subject: 'Engelse taal en Literatuur', room: 'abc101', teacher: 'rdg' },
      ],
      ui: { timeout_seconds: 15 },
    };

    updateClock();
    setInterval(updateClock, 1000);
    if (new URLSearchParams(window.location.search).has('demo')) {
      showSchedule(demoData);
    } else {
      showStandby();
    }
  </script>
</body>
</html>
