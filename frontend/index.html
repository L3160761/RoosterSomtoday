<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoosterSomtoday</title>
  <style>
    :root {
      --page: #0c0d15;
      --left-panel: #141522;
      --right-panel: #0f1019;
      --frame: #202235;
      --divider: #0e0f17;
      --card: #192f45;
      --accent: #6ba1d7;
      --accent-dark: #6ba1d7;
      --text: #f5f6f4;
      --muted: #b7b7b7;
      --track: #232838;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body { padding: clamp(8px, 0.75vw, 14px); }

    .screen-frame {
      width: 100%;
      height: 100%;
      border: 3px solid var(--frame);
      border-radius: clamp(22px, 1.75vw, 34px);
      overflow: hidden;
      background: var(--right-panel);
      box-shadow: 0 0 0 2px #080a11;
    }

    .standby-screen {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      background: var(--left-panel);
    }

    .standby-content { transform: translateY(-2vh); }

    .standby-clock {
      margin: 0;
      font-size: clamp(64px, 8vw, 150px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.06em;
    }

    .standby-date {
      margin-top: 14px;
      color: var(--muted);
      font-size: clamp(18px, 1.65vw, 32px);
    }

    .scan-prompt {
      margin-top: clamp(50px, 8vh, 100px);
      color: var(--accent);
      font-size: clamp(24px, 2.4vw, 44px);
      font-weight: 750;
    }

    .schedule-screen {
      display: none;
      width: 100%;
      height: 100%;
      grid-template-columns: 50.5% 49.5%;
    }

    .schedule-screen.active { display: grid; }

    .left-panel,
    .right-panel {
      position: relative;
      min-width: 0;
      height: 100%;
    }

    .left-panel {
      padding: clamp(28px, 2.25vw, 54px) clamp(34px, 3vw, 64px);
      background: var(--left-panel);
      border-right: 2px solid var(--divider);
    }

    .right-panel {
      padding: clamp(28px, 2.2vw, 50px) clamp(36px, 4.75vw, 90px) clamp(24px, 2vw, 44px) clamp(48px, 5.2vw, 100px);
      background: var(--right-panel);
    }

    h1,
    h2 { margin: 0; }

    .welcome {
      font-size: clamp(44px, 3.55vw, 68px);
      line-height: 1.05;
      font-weight: 850;
      letter-spacing: -0.035em;
    }

    .student-name { color: var(--accent); }

    .section-heading {
      margin-top: clamp(32px, 4.25vh, 54px);
      font-size: clamp(28px, 2.45vw, 46px);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.025em;
    }

    .next-row {
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 16px;
      margin-top: clamp(14px, 1.8vh, 24px);
      margin-left: 14px;
      max-width: 680px;
    }

    .next-lesson-host { display: contents; }

    .period-number {
      color: var(--text);
      font-size: clamp(20px, 1.6vw, 30px);
      font-weight: 450;
      text-align: center;
    }

    .lesson-card {
      position: relative;
      min-height: clamp(82px, 9.3vh, 108px);
      padding: clamp(12px, 1.15vh, 18px) clamp(18px, 1.35vw, 26px);
      border-left: 6px solid var(--accent);
      border-radius: 14px;
      background: var(--card);
      overflow: hidden;
    }

    .lesson-subject {
      max-width: calc(100% - 128px);
      overflow: hidden;
      color: var(--text);
      font-size: clamp(20px, 1.63vw, 31px);
      line-height: 1.18;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lesson-details {
      margin-top: 8px;
      overflow: hidden;
      color: var(--muted);
      font-size: clamp(17px, 1.35vw, 26px);
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .time-pill {
      position: absolute;
      top: 11px;
      right: 13px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 96px;
      padding: 3px 13px 4px;
      border-radius: 999px;
      background: var(--accent);
      color: #07101a;
      font-size: clamp(15px, 1.1vw, 21px);
      line-height: 1;
      white-space: nowrap;
    }

    .clock-icon {
      position: relative;
      display: inline-block;
      width: 19px;
      height: 19px;
      flex: 0 0 19px;
      border-radius: 50%;
      background: currentColor;
    }

    .clock-icon::before,
    .clock-icon::after {
      position: absolute;
      left: 9px;
      top: 4px;
      width: 2px;
      height: 6px;
      border-radius: 2px;
      background: var(--accent);
      content: "";
      transform-origin: bottom center;
    }

    .clock-icon::after {
      top: 8px;
      height: 5px;
      transform: rotate(125deg);
    }

    .day-info-heading { margin-top: clamp(38px, 4.2vh, 56px); }

    .day-time {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 20px 0 0 25px;
      font-size: clamp(21px, 1.6vw, 30px);
      font-weight: 450;
    }

    .day-time .clock-icon {
      width: 27px;
      height: 27px;
      flex-basis: 27px;
      color: var(--text);
    }

    .day-time .clock-icon::before {
      left: 13px;
      top: 6px;
      height: 8px;
      background: var(--left-panel);
    }

    .day-time .clock-icon::after {
      left: 13px;
      top: 12px;
      height: 7px;
      background: var(--left-panel);
    }

    .timer-ring {
      --progress: 75%;
      position: absolute;
      left: clamp(36px, 2.7vw, 54px);
      bottom: clamp(28px, 2.6vh, 42px);
      width: clamp(104px, 7.2vw, 136px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--accent) var(--progress), var(--track) 0);
      transform: rotate(-68deg);
    }

    .timer-ring::after {
      position: absolute;
      inset: 11px;
      border-radius: 50%;
      background: var(--left-panel);
      content: "";
    }

    .right-title {
      font-size: clamp(28px, 2.15vw, 42px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    .schedule-grid {
      display: grid;
      grid-template-rows: repeat(9, minmax(0, 1fr));
      height: calc(100% - clamp(54px, 6.6vh, 78px));
      margin-top: clamp(24px, 3vh, 34px);
    }

    .schedule-slot {
      display: grid;
      grid-template-columns: 30px 1fr;
      align-items: start;
      gap: 14px;
      min-height: 0;
    }

    .schedule-slot .period-number { padding-top: 31px; }

    .schedule-slot .lesson-card {
      min-height: 0;
      height: min(9.2vh, 96px);
      padding-top: 10px;
      padding-bottom: 9px;
    }

    .schedule-slot .lesson-subject { font-size: clamp(18px, 1.42vw, 27px); }
    .schedule-slot .lesson-details { margin-top: 6px; font-size: clamp(16px, 1.25vw, 23px); }

    .error-toast {
      position: fixed;
      left: 50%;
      bottom: 30px;
      z-index: 10;
      display: none;
      padding: 14px 22px;
      border: 1px solid #a94752;
      border-radius: 12px;
      background: #351b25;
      color: #ffcad0;
      transform: translateX(-50%);
    }

    .error-toast.show { display: block; }

    @media (max-width: 900px), (max-aspect-ratio: 1.25/1) {
      body { overflow: auto; padding: 0; }
      .screen-frame { min-height: 100%; border-radius: 0; }
      .schedule-screen { grid-template-columns: 1fr; height: auto; min-height: 100%; }
      .left-panel, .right-panel { min-height: 100vh; }
      .right-panel { padding-left: 36px; }
      .timer-ring { position: relative; left: auto; bottom: auto; margin-top: 60px; }
    }
  </style>
</head>
<body>
  <main class="screen-frame">
    <section class="standby-screen" id="standbyScreen">
      <div class="standby-content">
        <div class="standby-clock" id="clock">12:00</div>
        <div class="standby-date" id="date">woensdag 18 juni</div>
        <div class="scan-prompt">Houd je pas bij de scanner</div>
      </div>
    </section>

    <section class="schedule-screen" id="scheduleScreen">
      <div class="left-panel">
        <h1 class="welcome">Welkom, <span class="student-name" id="studentName">Gebruiker</span>!</h1>

        <h2 class="section-heading">Volgende les</h2>
        <div class="next-row">
          <div class="period-number" id="nextPeriod">1</div>
          <div class="next-lesson-host" id="nextLessonHost"></div>
        </div>

        <h2 class="section-heading day-info-heading">Daginfo</h2>
        <div class="day-time">
          <span class="clock-icon" aria-hidden="true"></span>
          <span id="dayTime">8:30 - 12:45</span>
        </div>

        <div class="timer-ring" id="timerRing" aria-label="Tijd tot terugkeer naar het scanscherm"></div>
      </div>

      <div class="right-panel">
        <h2 class="right-title">Dagrooster</h2>
        <div class="schedule-grid" id="scheduleGrid"></div>
      </div>
    </section>
  </main>

  <div class="error-toast" id="errorToast"></div>

  <script>
    const API_ORIGIN = 'http://localhost:8000';
    const HARDWARE_SCAN_API_URL = `${API_ORIGIN}/api/scan-hardware`;
    const DEFAULT_TIMEOUT_SECONDS = 45;
    const SLOT_COUNT = 9;

    const standbyScreen = document.getElementById('standbyScreen');
    const scheduleScreen = document.getElementById('scheduleScreen');
    const studentName = document.getElementById('studentName');
    const nextPeriod = document.getElementById('nextPeriod');
    const nextLessonHost = document.getElementById('nextLessonHost');
    const dayTime = document.getElementById('dayTime');
    const scheduleGrid = document.getElementById('scheduleGrid');
    const timerRing = document.getElementById('timerRing');
    const errorToast = document.getElementById('errorToast');
    const clock = document.getElementById('clock');
    const date = document.getElementById('date');

    let isScanning = false;
    let scanRetryTimeoutId;
    let screenTimerId;

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString('nl-NL', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
      });
      date.textContent = now.toLocaleDateString('nl-NL', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
      });
    }

    function createClockIcon() {
      const icon = document.createElement('span');
      icon.className = 'clock-icon';
      icon.setAttribute('aria-hidden', 'true');
      return icon;
    }

    function createLessonCard(lesson) {
      const card = document.createElement('article');
      card.className = 'lesson-card';

      const subject = document.createElement('div');
      subject.className = 'lesson-subject';
      subject.textContent = lesson.subject || 'Onbekende les';

      const details = document.createElement('div');
      details.className = 'lesson-details';
      details.textContent = [lesson.room, lesson.teacher].filter(Boolean).join(' • ');

      const pill = document.createElement('div');
      pill.className = 'time-pill';
      pill.append(createClockIcon(), document.createTextNode(lesson.start || '--:--'));

      card.append(subject, details, pill);
      return card;
    }

    function periodForLesson(lesson, lessons) {
      const index = lessons.findIndex((candidate) =>
        candidate.start === lesson?.start &&
        candidate.end === lesson?.end &&
        candidate.subject === lesson?.subject
      );
      return index >= 0 ? index + 1 : 1;
    }

    function renderSchedule(lessons) {
      scheduleGrid.replaceChildren();
      for (let slot = 1; slot <= SLOT_COUNT; slot += 1) {
        const row = document.createElement('div');
        row.className = 'schedule-slot';

        const number = document.createElement('div');
        number.className = 'period-number';
        number.textContent = slot;
        row.append(number);

        const lesson = lessons[slot - 1];
        if (lesson) row.append(createLessonCard(lesson));
        scheduleGrid.append(row);
      }
    }

    function showSchedule(data) {
      clearTimeout(scanRetryTimeoutId);
      standbyScreen.style.display = 'none';
      scheduleScreen.classList.add('active');

      const lessons = Array.isArray(data.today) ? data.today : [];
      const featuredLesson = data.now || data.next || lessons[0] || {};
      studentName.textContent = data.student_display || 'Gebruiker';
      nextPeriod.textContent = periodForLesson(featuredLesson, lessons);
      nextLessonHost.replaceChildren(createLessonCard(featuredLesson));

      dayTime.textContent = lessons.length
        ? `${lessons[0].start} - ${lessons[lessons.length - 1].end}`
        : '-';
      renderSchedule(lessons);
      startScreenTimer(Number(data.ui?.timeout_seconds) || DEFAULT_TIMEOUT_SECONDS);
    }

    function startScreenTimer(totalSeconds) {
      clearInterval(screenTimerId);
      const startedAt = Date.now();
      timerRing.style.setProperty('--progress', '100%');

      screenTimerId = setInterval(() => {
        const elapsed = (Date.now() - startedAt) / 1000;
        const progress = Math.max(0, 1 - elapsed / totalSeconds);
        timerRing.style.setProperty('--progress', `${progress * 100}%`);
        if (progress <= 0) showStandby();
      }, 100);
    }

    function queueHardwareScan(delay = 250) {
      clearTimeout(scanRetryTimeoutId);
      scanRetryTimeoutId = setTimeout(scanHardware, delay);
    }

    function showStandby() {
      clearInterval(screenTimerId);
      scheduleScreen.classList.remove('active');
      standbyScreen.style.display = 'grid';
      errorToast.classList.remove('show');
      isScanning = false;
      queueHardwareScan();
    }

    async function scanHardware() {
      if (isScanning) return;
      isScanning = true;

      try {
        const response = await fetch(HARDWARE_SCAN_API_URL);
        if (!response.ok) {
          isScanning = false;
          queueHardwareScan(750);
          return;
        }
        showSchedule(await response.json());
      } catch (error) {
        isScanning = false;
        queueHardwareScan(1000);
      }
    }

    const demoData = {
      student_display: 'Gebruiker',
      next: { start: '10:00', end: '10:45', subject: 'Nederlandse taal en Literatuur', room: 'abc003', teacher: 'jdk' },
      today: [
        { start: '8:30', end: '9:15', subject: 'Wiskunde B', room: 'abc202', teacher: 'wde' },
        { start: '9:15', end: '10:00', subject: 'Wiskunde B', room: 'abc202', teacher: 'wde' },
        { start: '10:00', end: '10:45', subject: 'Nederlandse taal en Literatuur', room: 'abc003', teacher: 'jdk' },
        { start: '11:15', end: '12:00', subject: 'Scheikunde', room: 'a115', teacher: 'bkm' },
        { start: '12:00', end: '12:45', subject: 'Engelse taal en Literatuur', room: 'abc101', teacher: 'rdg' },
      ],
      ui: { timeout_seconds: 60 },
    };

    updateClock();
    setInterval(updateClock, 1000);
    if (new URLSearchParams(window.location.search).has('demo')) {
      showSchedule(demoData);
    } else {
      showStandby();
    }
  </script>
</body>
</html>
