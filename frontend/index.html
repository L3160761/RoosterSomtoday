<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 20px;
        }
        h1 {
            margin: 0;
        }
        .schedule {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            width: 360px;
        }
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .controls input,
        .controls button {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        .controls input {
            flex: 1;
        }
        .controls button {
            background: #2d6cdf;
            color: #fff;
            cursor: pointer;
        }
        .lesson {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #333;
        }
        .error {
            color: #ff6b6b;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Kiosk Standby Screen</h1>
        <div class="schedule">
            <div class="controls">
                <input id="tagInput" type="text" placeholder="Voer test tag-UID in">
                <button id="scanButton" type="button">Test scan</button>
            </div>
            <div id="scheduleDisplay">Wacht op testscan…</div>
            <div id="errorDisplay" class="error"></div>
        </div>
    </div>
    <script>
        const title = document.getElementById('title');
        const tagInput = document.getElementById('tagInput');
        const scanButton = document.getElementById('scanButton');
        const scheduleDisplay = document.getElementById('scheduleDisplay');
        const errorDisplay = document.getElementById('errorDisplay');
        let standbyTimeoutId;

        function formatLesson(label, lesson) {
            if (!lesson) {
                return `<div class="lesson"><strong>${label}:</strong> geen</div>`;
            }

            return `<div class="lesson">
                <strong>${label}:</strong><br>
                ${lesson.subject} · ${lesson.room}<br>
                ${lesson.teacher}<br>
                ${lesson.start} - ${lesson.end}
            </div>`;
        }

        function showStandby() {
            clearTimeout(standbyTimeoutId);
            title.textContent = 'Kiosk Standby Screen';
            scheduleDisplay.innerHTML = 'Wacht op testscan…';
            errorDisplay.style.display = 'none';
            errorDisplay.textContent = '';
        }

        function showError(message) {
            clearTimeout(standbyTimeoutId);
            title.textContent = 'Kiosk Standby Screen';
            scheduleDisplay.innerHTML = 'Wacht op testscan…';
            errorDisplay.textContent = message;
            errorDisplay.style.display = 'block';
        }

        function showSchedule(data) {
            clearTimeout(standbyTimeoutId);
            errorDisplay.style.display = 'none';
            title.textContent = `${data.student_display || 'Onbekende leerling'}`;

            const nowHtml = formatLesson('Huidige les', data.now);
            const nextHtml = formatLesson('Volgende les', data.next);

            scheduleDisplay.innerHTML = `
                <div><strong>Leerling:</strong> ${data.student_display || '-'}</div>
                <div><strong>Datum:</strong> ${data.date || '-'}</div>
                ${nowHtml}
                ${nextHtml}
            `;
        }

        async function scanTag(tagUid) {
            const trimmed = (tagUid || '').trim();
            if (!trimmed) {
                showError('Voer eerst een tag-UID in');
                return;
            }

            try {
                const response = await fetch('http://localhost:8000/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tag_uid: trimmed })
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        showError('Tag onbekend of rooster niet beschikbaar');
                    } else {
                        showError('Serverfout bij ophalen rooster');
                    }
                    return;
                }

                const data = await response.json();
                showSchedule(data);
                const timeoutSeconds = data?.ui?.timeout_seconds || 45;
                standbyTimeoutId = setTimeout(showStandby, timeoutSeconds * 1000);
            } catch (e) {
                showError('Backend niet bereikbaar');
            }
        }

        scanButton.addEventListener('click', () => scanTag(tagInput.value));
        tagInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                scanTag(tagInput.value);
            }
        });

        showStandby();
    </script>
</body>
</html>
